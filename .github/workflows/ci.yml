name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: swiftlint --strict 2>&1 || true

  spm-test:
    name: SPM Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: xcodebuild -version
      - name: Run DomainKit tests
        run: swift test --package-path Packages/DomainKit 2>&1
      - name: Run DataKit tests
        run: swift test --package-path Packages/DataKit 2>&1

  build:
    name: Build App
    runs-on: macos-15
    needs: [lint, spm-test]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .
      - name: Build (Debug, simulator)
        run: |
          xcodebuild build \
            -scheme YourTJCourse \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
