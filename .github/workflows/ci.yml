name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: SwiftLint
        run: swiftlint --strict 2>&1 || true

  spm-test:
    name: SPM Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Run DomainKit tests
        run: swift test --package-path Packages/DomainKit 2>&1
      - name: Run DataKit tests
        run: swift test --package-path Packages/DataKit 2>&1

  build:
    name: Build App
    if: ${{ github.ref_name != 'dev' }}
    runs-on: macos-15
    needs: [lint, spm-test]
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode (latest stable, iOS 18+ SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Xcode version
        run: xcodebuild -version
      - name: List available simulators
        run: xcrun simctl list devices available 2>&1 | grep -i iphone | tail -5
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .
      - name: Build (Debug, simulator)
        run: |
          xcodebuild build \
            -scheme YourTJCourse \
            -destination generic/platform=iOS \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
